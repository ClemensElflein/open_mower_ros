name: Build

# Controls when the workflow will run
on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build without cache'
        default: false
        type: boolean
      variant:
        description: 'Which set to build: default (osv1+osv2), all (all four), or a specific variant'
        required: true
        default: 'default'
        type: choice
        options:
          - default   # build osv1 + osv2
          - all       # build all (osv1, osv2, osv1-dev, osv2-dev)
          - osv2      # slim runtime only (suffix none)
          - osv1      # legacy runtime only (suffix -legacy)
          - osv2-dev  # dev full OSv2 (suffix -dev)
          - osv1-dev  # dev full OSv1 (suffix -legacy-dev)
      arch:
        description: 'Which architecture to build (amd64/arm64 or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - amd64
          - arm64
  push:
    branches:
      - 'main'
      - 'releases/**'
      - 'v2'
    tags:
      - 'v*'

# Allow stopping obsolete workflows
concurrency:
  group: ci-buildtrain-${{ github.ref }}-1
  cancel-in-progress: true

# permissions are needed if pushing to ghcr.io
permissions:
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
  # NOTE: matrix.variant -> Docker target mapping:
  #   osv2      -> runtime-osv2 (distilled minimal OSv2)
  #   osv1      -> assemble-osv1 (legacy stack w/ services)
  #   osv2-dev  -> assemble-osv2 (full OSv2 dev)
  #   osv1-dev  -> assemble-osv1 (legacy dev; treat same target but different tagging & build args)
    strategy:
      matrix:
        include:
          # OSv1 (legacy slim/regular)
          - os: ubuntu-24.04-arm
            docker_build_arch: arm64
            variant: osv1
            dockerfile: ./docker/Dockerfile
            build_target: assemble-osv1
          - os: ubuntu-24.04
            docker_build_arch: amd64
            variant: osv1
            dockerfile: ./docker/Dockerfile
            build_target: assemble-osv1
          - os: ubuntu-24.04-arm
            docker_build_arch: arm64
            variant: osv2
            dockerfile: ./docker/Dockerfile
            build_target: runtime-osv2
          - os: ubuntu-24.04
            docker_build_arch: amd64
            variant: osv2
            dockerfile: ./docker/Dockerfile
            build_target: runtime-osv2
          # OSv2 dev (full)
          - os: ubuntu-24.04-arm
            docker_build_arch: arm64
            variant: osv2-dev
            dockerfile: ./docker/Dockerfile
            build_target: assemble-osv2
          - os: ubuntu-24.04
            docker_build_arch: amd64
            variant: osv2-dev
            dockerfile: ./docker/Dockerfile
            build_target: assemble-osv2
          # OSv1 dev (legacy full dev) – reuse assemble-osv1 target with dev build args
          - os: ubuntu-24.04-arm
            docker_build_arch: arm64
            variant: osv1-dev
            dockerfile: ./docker/Dockerfile
            build_target: assemble-osv1
          - os: ubuntu-24.04
            docker_build_arch: amd64
            variant: osv1-dev
            dockerfile: ./docker/Dockerfile
            build_target: assemble-osv1
    steps:
      - name: Prepare
        env:
          REPOSITORY: '${{ github.repository }}'
        run: |
          build_arch=${{ matrix.docker_build_arch }}
          echo "BUILD_ARCH=${build_arch//\//-}" >> ${GITHUB_ENV}
          # Lowercase ghcr image name: ghcr.io/<owner>/<repo>
          repo_lc=${REPOSITORY,,}
          echo "REPOSITORY_LC=${repo_lc}" >> ${GITHUB_ENV}

      # Get the repository's code
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # Setup Python 3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3'

      - uses: pre-commit/action@v3.0.1

      - name: Docker meta (OSv2)
        if: matrix.variant == 'osv2'
        id: meta_osv2
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.REPOSITORY_LC }}
          flavor: |
            latest=false
      - name: Docker meta (OSv2 Dev)
        if: matrix.variant == 'osv2-dev'
        id: meta_osv2_dev
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.REPOSITORY_LC }}
          flavor: |
            latest=false
            suffix=-dev
      - name: Docker meta (OSv1)
        if: matrix.variant == 'osv1'
        id: meta_osv1
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.REPOSITORY_LC }}
          flavor: |
            latest=false
            suffix=-legacy
      - name: Docker meta (OSv1 Dev)
        if: matrix.variant == 'osv1-dev'
        id: meta_osv1_dev
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.REPOSITORY_LC }}
          flavor: |
            latest=false
            suffix=-legacy-dev

      - name: Select metadata labels
        # Dispatch gating:
        #   default -> osv1 + osv2
        #   all     -> all four variants
        #   osv1    -> only osv1
        #   osv2    -> only osv2
        #   osv1-dev-> only osv1-dev
        #   osv2-dev-> only osv2-dev
        if: github.event_name != 'workflow_dispatch' || (((inputs.variant == 'all') || (inputs.variant == 'default' && (matrix.variant == 'osv1' || matrix.variant == 'osv2')) || (inputs.variant == matrix.variant)) && (inputs.arch == 'all' || inputs.arch == matrix.docker_build_arch))
        run: |
          case "${{ matrix.variant }}" in
            osv2)
              echo "META_LABELS=${{ steps.meta_osv2.outputs.labels }}" >> ${GITHUB_ENV}
              ;;
            osv2-dev)
              echo "META_LABELS=${{ steps.meta_osv2_dev.outputs.labels }}" >> ${GITHUB_ENV}
              ;;
            osv1)
              echo "META_LABELS=${{ steps.meta_osv1.outputs.labels }}" >> ${GITHUB_ENV}
              ;;
            osv1-dev)
              echo "META_LABELS=${{ steps.meta_osv1_dev.outputs.labels }}" >> ${GITHUB_ENV}
              ;;
          esac

      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        if: github.event_name != 'workflow_dispatch' || (((inputs.variant == 'all') || (inputs.variant == 'default' && (matrix.variant == 'osv1' || matrix.variant == 'osv2')) || (inputs.variant == matrix.variant)) && (inputs.arch == 'all' || inputs.arch == matrix.docker_build_arch))
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: (github.event_name != 'pull_request') && (github.event_name != 'workflow_dispatch' || (((inputs.variant == 'all') || (inputs.variant == 'default' && (matrix.variant == 'osv1' || matrix.variant == 'osv2')) || (inputs.variant == matrix.variant)) && (inputs.arch == 'all' || inputs.arch == matrix.docker_build_arch)))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (unified Dockerfile)
        if: github.event_name != 'workflow_dispatch' || (((inputs.variant == 'all') || (inputs.variant == 'default' && (matrix.variant == 'osv1' || matrix.variant == 'osv2')) || (inputs.variant == matrix.variant)) && (inputs.arch == 'all' || inputs.arch == matrix.docker_build_arch))
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.docker_build_arch }}
          target: ${{ matrix.build_target }}
          no-cache: ${{ inputs.clean_build == true || false }}
          labels: ${{ env.META_LABELS }}
              # RUNTIME_FULL build arg: 1 for dev variants (osv2-dev, osv1-dev) keeps toolchain & headers
          build-args: |
            RUNTIME_FULL=${{ (matrix.variant == 'osv2-dev' || matrix.variant == 'osv1-dev') && '1' || '0' }}
            RUNTIME_EXTENDED_PRUNE=${{ matrix.variant == 'osv2' && '1' || '0' }}
            RUNTIME_HEAVY_PRUNE=${{ matrix.variant == 'osv2' && '1' || '0' }}
            RUNTIME_PRUNE_TOOLCHAIN=${{ matrix.variant == 'osv2' && '1' || '0' }}
          outputs: type=image,name=ghcr.io/${{ env.REPOSITORY_LC }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=${{ matrix.os }}
          cache-to: type=gha,scope=${{ matrix.os }},mode=max

      - name: Export digest
        if: github.event_name != 'workflow_dispatch' || (((inputs.variant == 'all') || (inputs.variant == 'default' && (matrix.variant == 'osv1' || matrix.variant == 'osv2')) || (inputs.variant == matrix.variant)) && (inputs.arch == 'all' || inputs.arch == matrix.docker_build_arch))
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build-and-push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'workflow_dispatch' || (((inputs.variant == 'all') || (inputs.variant == 'default' && (matrix.variant == 'osv1' || matrix.variant == 'osv2')) || (inputs.variant == matrix.variant)) && (inputs.arch == 'all' || inputs.arch == matrix.docker_build_arch))
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.docker_build_arch }}-${{ matrix.variant }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    needs:
      - build
    strategy:
      matrix:
        include:
          - variant: osv2      # slim (may get latest)
          - variant: osv1      # legacy
          - variant: osv2-dev  # dev
          - variant: osv1-dev  # legacy-dev
    steps:
      - name: Prepare
        env:
          REPOSITORY: '${{ github.repository }}'
        run: |
          echo "REPOSITORY_LC=${REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Download digests
        if: github.event_name != 'workflow_dispatch' || inputs.variant == 'all' || (inputs.variant == 'default' && (matrix.variant == 'osv1' || matrix.variant == 'osv2')) || (inputs.variant == matrix.variant)
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*-${{ matrix.variant }}
          merge-multiple: true
      # OSv2 main push (adds latest)
      - name: Docker meta (OSv2 - main)
        if: >
          (matrix.variant == 'osv2') &&
          (github.event_name == 'push') &&
          (github.ref == 'refs/heads/main')
        id: meta_osv2_main
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPOSITORY_LC }}
          tags: |
            type=edge,branch=main
            type=sha
          flavor: |
            latest=true
      # OSv2 general (no latest)
      - name: Docker meta (OSv2)
        if: (matrix.variant == 'osv2') && !((github.event_name == 'push') && (github.ref == 'refs/heads/main')) && (github.event_name != 'workflow_dispatch' || inputs.variant == 'all' || inputs.variant == matrix.variant || inputs.variant == 'default')
        id: meta_osv2
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPOSITORY_LC }}
          tags: |
            type=edge,branch=main
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          flavor: |
            latest=false
      # OSv1 legacy
      - name: Docker meta (OSv1)
        if: (matrix.variant == 'osv1') && (github.event_name != 'workflow_dispatch' || inputs.variant == 'all' || inputs.variant == matrix.variant || inputs.variant == 'default')
        id: meta_osv1
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPOSITORY_LC }}
          tags: |
            type=edge,branch=main,prefix=releases-
            type=schedule,suffix=-legacy
            type=ref,event=branch,suffix=-legacy
            type=ref,event=pr,suffix=-legacy
            type=semver,pattern={{version}},suffix=-legacy
            type=semver,pattern={{major}}.{{minor}},suffix=-legacy
            type=semver,pattern={{major}},suffix=-legacy
            type=sha,suffix=-legacy
          flavor: |
            latest=false
      # OSv2 dev
      - name: Docker meta (OSv2 Dev)
        if: (matrix.variant == 'osv2-dev') && (github.event_name != 'workflow_dispatch' || inputs.variant == 'all' || inputs.variant == matrix.variant)
        id: meta_osv2_dev
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPOSITORY_LC }}
          tags: |
            type=edge,branch=main,suffix=-dev
            type=schedule,suffix=-dev
            type=ref,event=branch,suffix=-dev
            type=ref,event=pr,suffix=-dev
            type=semver,pattern={{version}},suffix=-dev
            type=semver,pattern={{major}}.{{minor}},suffix=-dev
            type=semver,pattern={{major}},suffix=-dev
            type=sha,suffix=-dev
          flavor: |
            latest=false
      # OSv1 dev
      - name: Docker meta (OSv1 Dev)
        if: (matrix.variant == 'osv1-dev') && (github.event_name != 'workflow_dispatch' || inputs.variant == 'all' || inputs.variant == matrix.variant)
        id: meta_osv1_dev
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPOSITORY_LC }}
          tags: |
            type=edge,branch=main,suffix=-legacy-dev
            type=schedule,suffix=-legacy-dev
            type=ref,event=branch,suffix=-legacy-dev
            type=ref,event=pr,suffix=-legacy-dev
            type=semver,pattern={{version}},suffix=-legacy-dev
            type=semver,pattern={{major}}.{{minor}},suffix=-legacy-dev
            type=semver,pattern={{major}},suffix=-legacy-dev
            type=sha,suffix=-legacy-dev
          flavor: |
            latest=false

      - name: Login to GHCR
        if: github.event_name != 'workflow_dispatch' || inputs.variant == 'all' || (inputs.variant == 'default' && (matrix.variant == 'osv1' || matrix.variant == 'osv2')) || (inputs.variant == matrix.variant)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        if: github.event_name != 'workflow_dispatch' || inputs.variant == 'all' || (inputs.variant == 'default' && (matrix.variant == 'osv1' || matrix.variant == 'osv2')) || (inputs.variant == matrix.variant)
        working-directory: /tmp/digests
        run: |
          echo "Found digest files:" && ls -la || true
          if [ "$(ls -1 | wc -l)" -eq 0 ]; then
            echo "No digests found, skipping manifest creation for ${{ matrix.variant }}"
            exit 0
          fi
          TAG_ARGS=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          echo "Creating manifest with tags: $TAG_ARGS"
          docker buildx imagetools create ${TAG_ARGS} \
            $(printf 'ghcr.io/${{ env.REPOSITORY_LC }}@sha256:%s ' *)

      - name: Inspect image
        if: github.event_name != 'workflow_dispatch' || inputs.variant == 'all' || (inputs.variant == 'default' && (matrix.variant == 'osv1' || matrix.variant == 'osv2')) || (inputs.variant == matrix.variant)
        run: |
          docker buildx imagetools inspect $(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
