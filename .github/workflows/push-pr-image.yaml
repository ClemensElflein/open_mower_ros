name: Push PR Image

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

permissions:
  packages: write

jobs:
  push:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - arch: amd64
            variant: default
            tag_suffix: ""
          - arch: amd64
            variant: legacy
            tag_suffix: "-legacy"
          - arch: arm64
            variant: default
            tag_suffix: ""
          - arch: arm64
            variant: legacy
            tag_suffix: "-legacy"
    steps:
      - name: Prepare
        env:
          REPOSITORY: '${{ github.repository }}'
        run: echo "REPOSITORY_LC=${REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/pulls" \
            --jq ".[] | select(.head.sha == \"${{ github.event.workflow_run.head_sha }}\") | .number" \
            | head -1)
          if [[ ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Could not resolve PR number for SHA ${{ github.event.workflow_run.head_sha }} (got: '${PR_NUMBER}')" >&2
            exit 1
          fi
          echo "number=${PR_NUMBER}" >> $GITHUB_OUTPUT

      - name: Download image tar
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.arch }}-${{ matrix.variant }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load and push
        run: |
          docker load < image.tar
          TAG="ghcr.io/${{ env.REPOSITORY_LC }}:pr-${{ steps.pr.outputs.number }}-${{ matrix.arch }}${{ matrix.tag_suffix }}"
          docker tag "open_mower-pr:${{ matrix.variant }}" "$TAG"
          docker push "$TAG"

  merge:
    needs: push
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - variant: default
            tag_suffix: ""
          - variant: legacy
            tag_suffix: "-legacy"
    steps:
      - name: Prepare
        env:
          REPOSITORY: '${{ github.repository }}'
        run: echo "REPOSITORY_LC=${REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/pulls" \
            --jq ".[] | select(.head.sha == \"${{ github.event.workflow_run.head_sha }}\") | .number" \
            | head -1)
          if [[ ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Could not resolve PR number for SHA ${{ github.event.workflow_run.head_sha }} (got: '${PR_NUMBER}')" >&2
            exit 1
          fi
          echo "number=${PR_NUMBER}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest
        run: |
          REPO="ghcr.io/${{ env.REPOSITORY_LC }}"
          PR="${{ steps.pr.outputs.number }}"
          SUFFIX="${{ matrix.tag_suffix }}"
          docker buildx imagetools create \
            -t "${REPO}:pr-${PR}${SUFFIX}" \
            "${REPO}:pr-${PR}-amd64${SUFFIX}" \
            "${REPO}:pr-${PR}-arm64${SUFFIX}"
