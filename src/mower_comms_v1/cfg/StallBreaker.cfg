#!/usr/bin/env python

# Dynamic reconfigure config for the per-wheel stall-breaker in mower_comms_v1.

from dynamic_reconfigure.parameter_generator_catkin import ParameterGenerator, double_t, int_t, bool_t

gen = ParameterGenerator()

gen.add("enabled",                bool_t,   0, "Master switch. When false the stall-breaker is a no-op.",                         False)
gen.add("min_cmd_duty",           double_t, 0, "Don't trigger if |commanded duty| is below this (robot meant to be stopped).",   0.05, 0.0, 1.0)
gen.add("rpm_threshold",          int_t,    0, "Below this measured |rpm|, the wheel counts as 'not moving'.",                   50,  0,  2000)
gen.add("detect_time_ms",         int_t,    0, "Dwell (ms) in DETECTING before firing a pulse.",                                 300, 0,  5000)
gen.add("pulse_duty",             double_t, 0, "Override duty-cycle magnitude during PULSING (signed by commanded direction).", 0.8, 0.0, 1.0)
gen.add("pulse_time_ms",          int_t,    0, "How long (ms) a pulse lasts.",                                                   500, 0,  5000)
gen.add("cooldown_time_ms",       int_t,    0, "Wait (ms) after a pulse before another pulse can start.",                        1000, 0, 10000)
gen.add("max_consecutive_pulses", int_t,    0, "After this many unsuccessful pulses, stop pulsing and warn until motion returns.", 5,  1,  50)
gen.add("motion_reset_ms",        int_t,    0, "Sustained motion dwell (ms) that resets consecutive_pulses.",                    200, 0,  5000)

exit(gen.generate("mower_comms_v1", "mower_comms_v1", "StallBreaker"))
